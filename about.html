<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>关于 - 步道</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="/">首页</a>
  <a href="/about.html">超级星期六</a>
  <a href="/tongxing.html">童行</a>
  <a href="/what.html">全球同工</a>
  <a href="/contact.html">联系</a>
</nav>

<main>
<h1 class="title-main">
    本周步道·超级星期六
</h1>

<div class="title-date">
    2026年4月25日
</div>

<!-- 爆炸信息区 -->
<div class="info-explode">

    <div class="item location">
        北京·怀柔<br>雁栖湖西山步道
    </div>

    <div class="item time">
        09:30集合
    </div>

    <div class="item duration">
        3小时
    </div>

    <div class="item level">
        简单
    </div>

    <div class="item distance">
        5千米
    </div>

    <div class="item climb">
        爬升200米
    </div>

    <div class="item note">
        木栈道 / 长者、儿童友好
      </div>
      
</main>
  <!-- 报名弹窗 -->
<div class="modal" id="signupModal">

    <div class="modal-content">

        <span class="close-btn" onclick="closeModal()">×</span>

        <h3>报名参加</h3>

        <input type="text" placeholder="姓名">
        <input type="text" placeholder="手机号">
        <input type="text" placeholder="是否带人（可选）">

        <button class="submit-btn">提交报名</button>

        <div class="modal-note">
            提交后，请扫码进入活动群
        </div>

    </div>

</div>
<div class="action-row">

    <div class="action-left">
        <a href="javascript:void(0)" onclick="openModal()" class="signup-button">
            立即报名
        </a>
        <div class="signup-note">
            30秒完成报名
        </div>
    </div>

    <div class="action-right">
        <img src="images/groupQR.jpg" class="group-qr">
        <div class="group-note">
            扫码加入 · 获取实时信息与带领联系
        </div>
    </div>

</div>
<!-- JS（必须在最底部） -->
<script>
function openModal() {
    document.getElementById("signupModal").style.display = "flex";
}

function closeModal() {
    document.getElementById("signupModal").style.display = "none";
}
</script>

</body>
</html>

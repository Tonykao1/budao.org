<body>

<main>
<h1 class="title-main">
    本周步道·领袖行军
</h1>

<div class="title-date">
    2026年5月2日
</div>
<div class="countdown">
  <div id="countdownTimer">倒计时加载中...</div>
</div>
<!-- 爆炸信息区 -->
<div class="info-explode">

    <div class="item location">
        北京·顺义<br>舞彩浅山骆驼峰小环线
    </div>

    <div class="item time">
        09:00集合
    </div>

    <div class="item duration">
        6小时
    </div>

    <div class="item level">
        挑战级
    </div>

    <div class="item distance">
        长度7千米
    </div>

    <div class="item climb">
        爬升608米
    </div>

    <div class="item note">
        土、石野路，木栈道，铺装路 / 10岁以下儿童不宜参与
      </div>
    
</main>
   <div class="action-right">
        <img src="images/0502.jpg" class="group-qr" onclick="openImage()">
        <div class="group-note">
            扫码进群，即完成报名
        </div>   
     </div>   
   <div class="image-modal" id="imageModal" style="display:none;" onclick="closeImage()">
    <img src="images/0502.jpg" class="image-modal-content">
</div> 

 <script>
function openImage() {
    document.getElementById("imageModal").style.display = "flex";
}

function closeImage() {
    document.getElementById("imageModal").style.display = "none";
}

/* 倒计时 */
const targetTime = new Date("2026-05-02T09:00:00+08:00");

function updateCountdown() {
    const now = new Date();
    const diff = targetTime - now;

    const el = document.getElementById("countdownTimer");

    if (diff <= 0) {
        el.innerHTML = "已开始";
        return;
    }

    const hours = Math.floor(diff / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    el.innerHTML = hours + "小时 " + minutes + "分 " + seconds + "秒";
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>
</body>
  
</html>

 <script>
// ====== 活动配置（以后只改这里） ======
const eventConfig = {
  date: "2026-05-09",
  time: "13:00",
  duration: 180,
};

// ====== 时间状态核心 ======
function getEventState(config) {
  const now = new Date();
  const start = new Date(`${config.date}T${config.time}:00`);
  const end = new Date(start.getTime() + config.duration * 60 * 1000);

  if (now < start) {
    return { state: "countdown", diff: start - now };
  } else if (now >= start && now < end) {
    return { state: "started", diff: end - now };
  } else {
    return { state: "ended", diff: 0 };
  }
}
   function openImage() {
    document.getElementById("imageModal").style.display = "flex";
}

function closeImage() {
    document.getElementById("imageModal").style.display = "none";
}

/* 倒计时 */
const targetTime = new Date("2026-05-02T09:00:00+08:00");

function updateCountdown() {
    const now = new Date();
    const diff = targetTime - now;

    const el = document.getElementById("countdownTimer");

    if (diff <= 0) {
        el.innerHTML = "已开始";
        return;
    }

    const hours = Math.floor(diff / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    el.innerHTML = hours + "小时 " + minutes + "分 " + seconds + "秒";
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

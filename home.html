  <section>

<script>

const playlist = [

    "music/14 Silent Night.mp3",

    "music/06 The Good, The Bad, And The Ugly.mp3",

    "music/19 Shalom Chaverim.mp3"

];

let currentTrack = 0;

const audio = new Audio(playlist[currentTrack]);

const playBtn = document.getElementById("playBtn");

let isPlaying = false;

/* 点击“走” */

playBtn.addEventListener("click", () => {

    if(!isPlaying){

        audio.play();

        playBtn.classList.add("playing");

        isPlaying = true;

    }else{

        audio.pause();

        playBtn.classList.remove("playing");

        isPlaying = false;
    }
});

/* 一首结束后自动下一首 */

audio.addEventListener("ended", () => {

    currentTrack++;

    if(currentTrack >= playlist.length){

        currentTrack = 0;
    }

    audio.src = playlist[currentTrack];

    audio.load();

    audio.play();
});

/* 如果全部停止 */

audio.addEventListener("pause", () => {

    if(currentTrack >= playlist.length){

    currentTrack = 0;

    playBtn.classList.remove("playing");

    isPlaying = false;
function playCurrentTrack(){

    audio.src = playlist[currentTrack];

    audio.load();

    audio.play();

    playBtn.classList.add("playing");

    isPlaying = true;
}
    return;
}
});
const nextBtn = document.getElementById("nextBtn");

nextBtn.addEventListener("click", () => {

    currentTrack++;

    if(currentTrack >= playlist.length){

        currentTrack = 0;
    }

    playCurrentTrack();
});
</script>

<script>

const playlist = [

    "music/14 Silent Night.mp3",

    "music/06 The Good, The Bad, And The Ugly.mp3",

    "music/19 Shalom Chaverim.mp3",
  
    "music/Dreaming.mp3",

    "music/07 Barrios Mangoré_ Un Sueño En La Floresta.mp3",

    "music/08 Imagine.mp3",

    "music/08 xindeshijie.mp3",

    "music/10 Si Quieres Que Te Cortexe.mp3"

];

let currentTrack = 0;

const audio = new Audio(playlist[currentTrack]);
navigator.mediaSession.metadata =
new MediaMetadata({

    title: "同行之声",

    artist: "余生行走，不偏左右",

    album: "步道 budao.org",

   artwork: [
    {
        src: "https://budao.org/images/MEDIA.jpeg",
        sizes: "1024x1024",
        type: "image/jpeg"
    }
]
});
const playBtn = document.getElementById("playBtn");

const nextBtn = document.getElementById("nextBtn");

const prevBtn = document.getElementById("prevBtn");

let isPlaying = false;

/* 播放当前曲目 */

function playCurrentTrack(){

    audio.src = playlist[currentTrack];

    audio.load();

    audio.play();

    playBtn.classList.add("playing");

    isPlaying = true;
}

/* 点击“走” */

playBtn.addEventListener("click", () => {

    if(!isPlaying){

        playCurrentTrack();

    }else{

        audio.pause();

        playBtn.classList.remove("playing");

        isPlaying = false;
    }
});

/* 点击“右” */

nextBtn.addEventListener("click", () => {

    currentTrack++;

    if(currentTrack >= playlist.length){

        currentTrack = 0;
    }

    playCurrentTrack();
});
  
/* 点击“左” */
  
prevBtn.addEventListener("click", () => {

    currentTrack--;

    if(currentTrack < 0){

        currentTrack = playlist.length - 1;
    }

    playCurrentTrack();
});
  
/* 一首结束后自动下一首 */

audio.addEventListener("ended", () => {

    currentTrack++;

    if(currentTrack >= playlist.length){

        currentTrack = 0;

        playBtn.classList.remove("playing");

        isPlaying = false;

        return;
    }

    playCurrentTrack();
});

</script>
</body>

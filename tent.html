<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tent - Budao</title>
    <link rel="stylesheet" href="tent-style.css">
    <link rel="stylesheet" href="tent-word.css">
    <style>
      .publish-card-wrap {
        --preview-scale: 0.78;
        transform: translateY(76px) scale(0.76);
      }

      .presence.review-open .publish-card-wrap {
        transform: translateY(0) scale(var(--preview-scale));
      }

      .presence.review-closing .publish-card-wrap {
        transform: translateY(64px) scale(0.76);
      }

      .presence.publish-transition .publish-card-wrap,
      .presence.publish-finished .publish-card-wrap {
        transform: translateY(22px) scale(0.77);
      }

      @media (max-width: 620px) {
        .publish-card-wrap {
          --preview-scale: 0.62;
        }
      }

      @media (min-height: 900px) and (min-width: 760px) {
        .publish-card-wrap {
          --preview-scale: 0.86;
        }
      }
    </style>
  </head>
  <body>
    <main class="presence" aria-label="Tent">
      <div class="world">
        <div class="night" aria-hidden="true">
          <div class="air air-one"></div>
          <div class="air air-two"></div>
          <div class="horizon"></div>
          <div id="stars" class="stars"></div>
        </div>

        <section class="threshold" aria-label="进入帐篷前的安静">
          <button class="tent-button" type="button" aria-label="进入帐篷">
            <span class="inner-light" aria-hidden="true"></span>
            <svg class="tent" viewBox="0 0 420 300" role="img" aria-label="帐篷">
              <path class="ground-line" d="M65 247 C118 237 161 241 203 244 C260 248 310 249 358 238"></path>
              <path class="rear-line" d="M91 237 C126 169 153 110 207 45 C250 100 287 166 333 237"></path>
              <path class="front-line" d="M132 237 C158 161 178 105 207 45 C235 106 257 164 288 237"></path>
              <path class="ridge-line" d="M207 45 C205 103 205 170 205 238"></path>
              <path class="cloth-line cloth-left" d="M205 68 C184 119 168 175 151 236"></path>
              <path class="cloth-line cloth-right" d="M207 68 C229 124 248 177 269 236"></path>
              <path class="door door-left" d="M204 92 C187 138 174 187 162 237 C178 227 193 219 205 205 C205 164 205 126 204 92"></path>
              <path class="door door-right" d="M208 92 C225 139 239 188 252 237 C235 227 220 219 206 205 C206 164 207 126 208 92"></path>
              <path class="seam-line" d="M205 88 C205 128 205 166 205 207"></path>
              <path class="side-thread thread-left" d="M132 237 C120 249 105 257 85 263"></path>
              <path class="side-thread thread-right" d="M288 237 C301 248 320 254 341 256"></path>
            </svg>
          </button>

          <p class="question">这次，<br>你祈求祂如何带领这一程？</p>
        </section>
      </div>

      <section class="inside" aria-label="帐篷内部">
        <form class="entry-form">
          <label>
            <span>Email</span>
            <input name="email" type="email" autocomplete="email">
          </label>
          <label>
            <span>Password</span>
            <input name="password" type="password" autocomplete="current-password">
          </label>
          <button type="submit">进入帐篷</button>
          <p class="login-message" aria-live="polite"></p>
        </form>

        <section class="tent-entrance" aria-label="步与道">
          <button class="path-choice" type="button" data-tent-path="step">
            <span>步</span>
            <small>让身体出发</small>
          </button>

          <div class="path-divider" aria-hidden="true"></div>

          <button class="path-choice" type="button" data-tent-path="word">
            <span>道</span>
            <small>让心灵归回</small>
          </button>
        </section>

        <section class="word-room" aria-label="道">
          <div class="word-rest">
            <h1>道</h1>
            <p class="word-kicker">让心灵归回</p>
            <form class="word-form">
              <label class="word-field">
                <span>经文</span>
                <input name="scripture" type="text" autocomplete="off" placeholder="耶利米书 29:11">
              </label>

              <label class="word-field">
                <span>经文内容</span>
                <textarea name="scriptureText" rows="6"></textarea>
              </label>

              <label class="word-field">
                <span>主题</span>
                <input name="theme" type="text" autocomplete="off" placeholder="真正的自由">
              </label>

              <div class="word-questions" aria-label="问题">
                <label class="word-field"><span>问题一</span><input name="question1" type="text" autocomplete="off"></label>
                <label class="word-field"><span>问题二</span><input name="question2" type="text" autocomplete="off"></label>
                <label class="word-field"><span>问题三</span><input name="question3" type="text" autocomplete="off"></label>
                <label class="word-field"><span>问题四</span><input name="question4" type="text" autocomplete="off"></label>
                <label class="word-field"><span>问题五</span><input name="question5" type="text" autocomplete="off"></label>
                <label class="word-field"><span>问题六</span><input name="question6" type="text" autocomplete="off"></label>
                <label class="word-field"><span>问题七</span><input name="question7" type="text" autocomplete="off"></label>
              </div>

              <label class="word-field">
                <span>故事</span>
                <textarea name="story" rows="7"></textarea>
              </label>

              <label class="word-field">
                <span>高光时刻</span>
                <textarea name="highlights" rows="6"></textarea>
              </label>

              <label class="word-field">
                <span>回应</span>
                <textarea name="response" rows="6"></textarea>
              </label>

              <label class="word-field">
                <span>祷告</span>
                <textarea name="prayer" rows="8"></textarea>
              </label>

              <div class="word-actions">
                <button class="return-entrance" type="button">返回帐篷</button>
                <button class="word-place" type="submit">暂时安放</button>
                <button class="word-send" type="button">发布这一程</button>
              </div>

              <p class="word-message" aria-live="polite"></p>
            </form>
          </div>
        </section>

        <section class="route-room" aria-label="填写路线">
          <form class="route-form">
            <div class="route-fields">
              <label class="line-field">
                <span>路线名称</span>
                <input name="routeName" type="text" autocomplete="off">
              </label>

              <label class="line-field">
                <span>步道日期</span>
                <input name="trailDate" type="text" autocomplete="off">
              </label>

              <label class="line-field">
                <span>集合时间</span>
                <input name="meetingTime" type="text" autocomplete="off">
              </label>

              <label class="line-field">
                <span>线路难度</span>
                <input name="difficulty" type="text" autocomplete="off">
              </label>

              <label class="line-field">
                <span>适合人群</span>
                <input name="suitableFor" type="text" autocomplete="off">
              </label>

              <label class="line-field">
                <span>装备下限</span>
                <input name="equipmentMinimum" type="text" autocomplete="off">
              </label>

              <label class="line-field">
                <span>总里程</span>
                <input name="distance" type="text" autocomplete="off">
              </label>

              <label class="line-field">
                <span>累计爬升</span>
                <input name="elevationGain" type="text" autocomplete="off">
              </label>

              <label class="line-field">
                <span>地点层级</span>
                <input name="routeLocation" type="text" autocomplete="off" placeholder="中国 · 新疆 · 伊犁">
              </label>

              <label class="line-field">
                <span>时区</span>
                <input name="timezone" type="text" autocomplete="off" value="Asia/Shanghai">
              </label>

              <label class="line-field">
                <span>预计耗时</span>
                <input name="duration" type="text" autocomplete="off">
              </label>

              <label class="line-field">
                <span>集合地点</span>
                <input name="meetingPlace" type="text" autocomplete="off">
              </label>

              <label class="line-field wide">
                <span>路面描述</span>
                <textarea name="surfaceDescription" rows="3"></textarea>
              </label>

              <label class="line-field wide">
                <span>参与者要求</span>
                <textarea name="participantRequirements" rows="3"></textarea>
              </label>

              <label class="line-field wide">
                <span>行程说明</span>
                <textarea name="itinerary" rows="5"></textarea>
              </label>
            </div>

            <div class="image-offering">
              <label class="image-line">
                <span>上传图片</span>
                <input id="routeImages" name="routeImages" type="file" accept="image/*" multiple>
              </label>
              <p class="image-note" aria-live="polite">还没有选择图片</p>
              <button class="image-clear" type="button" hidden>移除已保留图片</button>
              <label class="image-line">
                <span>活动码</span>
                <input id="routeQrCode" name="routeQrCode" type="file" accept="image/*">
              </label>
              <p class="qr-note" aria-live="polite">还没有选择活动码</p>
            </div>

            <button class="quiet-submit" type="submit">保存步道</button>
            <p class="route-message" aria-live="polite"></p>
          </form>
        </section>

        <section class="publish-stage" aria-label="发布同行">
          <p class="publish-whisper" aria-live="polite"></p>
          <div class="publish-card-wrap">
            <div id="routePreview" class="route-preview"></div>
            <div class="publish-actions">
              <button class="return-edit" type="button">继续修改</button>
              <button class="send-trail" type="button">发布同行</button>
            </div>
          </div>
          <button class="view-published" type="button">看看他们现在看到什么</button>
        </section>
      </section>
    </main>
    <script>
      (function () {
        const originalSetItem = Storage.prototype.setItem;
        const originalFetch = window.fetch.bind(window);

        window.fetch = function (input, init) {
          const requestUrl = typeof input === "string" ? input : input && input.url || "";
          const method = init && init.method || input && input.method || "GET";
          const request = originalFetch(input, init);

          if (requestUrl.indexOf("/api/publish-route") >= 0 && String(method).toUpperCase() === "POST") {
            request.then(function (response) {
              if (!response.ok) {
                return;
              }

              response.clone().json().then(function (result) {
                if (result && result.ok === false) {
                  return;
                }

                window.setTimeout(function () {
                  window.location.href = "https://budao.org/test.html?published=" + Date.now();
                }, 1200);
              }).catch(function () {});
            }).catch(function () {});
          }

          return request;
        };

        function stripHeavyDraftAssets(value) {
          const trails = JSON.parse(value);

          if (!Array.isArray(trails)) {
            return value;
          }

          return JSON.stringify(trails.map(function (trail) {
            const copy = JSON.parse(JSON.stringify(trail));

            if (copy.source) {
              copy.source.images = [];

              if (String(copy.source.qrCode || "").indexOf("data:image/") === 0) {
                copy.source.qrCode = "";
              }
            }

            if (copy.testPage && copy.testPage.card) {
              copy.testPage.card.images = [];
            }

            return copy;
          }));
        }

        Storage.prototype.setItem = function (key, value) {
          try {
            return originalSetItem.call(this, key, value);
          } catch (error) {
            if (key !== "budao.tent.trails") {
              throw error;
            }

            try {
              return originalSetItem.call(this, key, stripHeavyDraftAssets(value));
            } catch (secondError) {
              this.removeItem(key);
              return undefined;
            }
          }
        };
      }());
    </script>
    <script src="tent-app.js"></script>
    <script src="tent-word.js"></script>
  </body>
</html>

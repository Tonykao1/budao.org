<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Budao CMS</title>

<style>

body{

    margin:0;
    background:#f5f2eb;

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "PingFang SC",
    sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
}

.panel{

    width:420px;

    background:white;

    border-radius:28px;

    padding:50px;

    box-shadow:
    0 20px 60px rgba(0,0,0,.08);

    text-align:center;

}

h1{

    font-weight:300;

    letter-spacing:.08em;

    margin-bottom:12px;

}

small{

    color:#999;

    letter-spacing:3px;

}

.menu{

    margin-top:45px;

    display:flex;

    flex-direction:column;

    gap:18px;

}

.menu a{

    text-decoration:none;

    color:#222;

    border:1px solid #ddd;

    border-radius:999px;

    padding:16px;

    transition:.3s;

}

.menu a:hover{

    background:#111;

    color:white;

}

</style>

</head>

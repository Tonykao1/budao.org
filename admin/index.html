<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Night</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{

    overflow:hidden;

    background:
    radial-gradient(
        ellipse at center,
        #131820 0%,
        #090c12 45%,
        #030406 100%
    );
}

/* 第一层：极远星空 */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background-image:

    radial-gradient(circle,#ffffff 0.8px,transparent 1px),
    radial-gradient(circle,#d9d9d9 0.8px,transparent 1px),
    radial-gradient(circle,#bfbfbf 0.8px,transparent 1px);

    background-size:
    180px 180px,
    270px 270px,
    420px 420px;

    background-position:
    20px 30px,
    120px 180px,
    260px 90px;

    opacity:.22;

}

/* 第二层：空气 */

body::after{

    content:"";

    position:fixed;

    inset:-10%;

    background:

    radial-gradient(
        ellipse at center,
        rgba(255,236,180,.025),
        transparent 65%
    );

    animation:
    breathe 18s ease-in-out infinite;

}

@keyframes breathe{

0%{

transform:scale(1);

opacity:.35;

}

50%{

transform:scale(1.05);

opacity:.55;

}

100%{

transform:scale(1);

opacity:.35;

}

}

</style>

</head>

<body>

</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>营火之地 | 步道</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:#f5f1e8;
    font-family: "PingFang SC", "Helvetica Neue", sans-serif;
    overflow-x:hidden;
}

/* 背景星点 */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:0;
    overflow:hidden;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.3;
    animation:twinkle 4s infinite ease-in-out;
}

@keyframes twinkle{
    0%{opacity:0.1;}
    50%{opacity:0.5;}
    100%{opacity:0.1;}
}

/* 中央暖光 */
.glow{
    position:fixed;
    width:800px;
    height:800px;
    background:radial-gradient(circle, rgba(255,140,0,0.12), transparent 70%);
    left:50%;
    top:200px;
    transform:translateX(-50%);
    z-index:0;
}

/* 内容 */
.container{
    position:relative;
    z-index:2;
    width:90%;
    max-width:900px;
    margin:auto;
    padding-top:120px;
    padding-bottom:200px;
}

/* 标题 */
.top{
    text-align:center;
    margin-bottom:180px;
}

.top small{
    letter-spacing:8px;
    color:#777;
    font-size:12px;
}

.top h1{
    font-size:72px;
    font-weight:200;
    margin-top:30px;
    margin-bottom:40px;
}

.top p{
    color:#aaa;
    line-height:2;
    font-size:20px;
}

/* 留言 */
.message{
    margin:140px 0;
    max-width:700px;
    line-height:1.8;
    font-size:34px;
    font-weight:200;
    opacity:0;
    transform:translateY(40px);
    animation:fadeUp 1.5s forwards;
}

.message:nth-child(even){
    margin-left:auto;
    text-align:right;
}

.message small{
    display:block;
    margin-top:25px;
    font-size:12px;
    letter-spacing:4px;
    color:#666;
}

@keyframes fadeUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* 尾部 */
.footer{
    text-align:center;
    margin-top:200px;
    color:#555;
    letter-spacing:6px;
    font-size:12px;
}

/* 手机 */
@media(max-width:768px){

    .top h1{
        font-size:48px;
    }

    .message{
        font-size:24px;
        margin:100px 0;
    }

}
</style>
</head>

<body>

<div class="stars"></div>
<div class="glow"></div>

<div class="container">

    <div class="top">
        <small>BUDAO</small>
        <h1>营火之地</h1>

        <p>
            有些话，<br>
            只有走过的人才会说出来。
        </p>
    </div>
<div id="messages-container"></div>




<script>

/* 星点 */

const stars = document.querySelector('.stars');

for(let i=0;i<80;i++){

    const star = document.createElement('div');

    star.classList.add('star');

    star.style.left = Math.random()*100 + '%';
    star.style.top = Math.random()*100 + '%';

    star.style.animationDuration =
        (2 + Math.random()*5) + 's';

    stars.appendChild(star);
}


/* 留言库 */

const allMessages = [

"一路上都悬念不断。",

"如此用心，细致又丰富的预备和带领，我们度过了一个美好又丰盛的徒步之旅！",

"还有整体节奏，何时走动何时休息都计划得很精准啊。",

"恩典多多，收获满满。",

"今天和弟兄姊妹们一起，感觉特别美好，感受到有祂的同在。感恩！",

"7—88岁的徒步团太壮观了！",

"今天无论是身体还是灵里，都收获满满，感恩弟兄姐妹们的陪伴和分享。",

"很巧妙的设计。",

"一个老少咸宜，充满喜乐的身心灵快乐之旅！",

"有幸参加了这次活动，都是意外的惊喜。",

"感谢弟兄们搭建的信心之道。",

"经过这一天，傍晚回来走在城市的水泥路上感觉特别轻盈和踏实。",

"可以看漫山的花，还能直接退回小学生作息九点睡觉，真的太好了！",

"认识和不认识人的都在认真听故事。",

"感恩遇见。",

"用心带领，详尽的总结复盘，感恩。",

"感恩祂。",

"很棒的经历。",

"今天的安排，很舒适又得着。",

"感恩弟兄姐妹们彼此敞开的分享和陪伴！",

"很棒的体验，很有趣的经历。",

"当天去时候怕迟到，超速百分之十被罚。",

"强度一点都不大，感觉还没缓过来。",

"113层，2034个台阶，300米。"

];


/* 随机排序 */

const shuffled = allMessages.sort(() => 0.5 - Math.random());

/* 每次显示8条 */

const selected = shuffled.slice(0, 8);

const container =
document.getElementById('messages-container');


selected.forEach((msg, index) => {

    const div = document.createElement('div');

    div.className = 'message';

    if(index % 2 === 1){
        div.style.marginLeft = 'auto';
        div.style.textAlign = 'right';
    }

    div.innerHTML = `
        “${msg}”
        <small>一次同行之后</small>
    `;

    container.appendChild(div);

});

</script>

</body>
</html>

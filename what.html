<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球同工 - 步道</title>

<link rel="stylesheet" href="style.css">

<style>
* {
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: #f5f5f5;
  color: #222;
}

.spark-page {
  width: min(88vw, 720px);
  margin: 0 auto;
  padding: 104px 0 132px;
}

.spark-intro {
  margin-bottom: 92px;
  text-align: center;
}

.spark-intro small {
  display: block;
  margin-bottom: 24px;
  color: #9d968b;
  font-size: 11px;
  letter-spacing: 6px;
}

.spark-intro h1 {
  margin: 0 0 30px;
  color: #25211b;
  font-size: clamp(44px, 7vw, 64px);
  font-weight: 200;
  letter-spacing: 0.08em;
  line-height: 1.35;
}

.spark-intro p {
  margin: 0;
  color: #666;
  font-size: 17px;
  font-weight: 300;
  line-height: 2;
  letter-spacing: 0.08em;
}

.spark-path {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 62px;
  margin: 0 auto;
  padding: 0 0 138px;
  text-align: left;
}

.spark-path::before {
  content: "";
  position: absolute;
  top: 9px;
  bottom: 0;
  left: 8px;
  width: 1px;
  background: linear-gradient(
    180deg,
    rgba(182, 136, 70, 0.42),
    rgba(126, 105, 76, 0.16) 72%,
    rgba(126, 105, 76, 0)
  );
}

.spark-node {
  position: relative;
  display: flex;
  gap: 34px;
  align-items: flex-start;
}

.spark-light {
  position: relative;
  z-index: 1;
  flex: 0 0 17px;
  width: 17px;
  height: 17px;
  margin-top: 8px;
  border-radius: 50%;
  background:
    radial-gradient(circle, #fff6dc 0 16%, #d8a65a 38%, rgba(176, 117, 54, 0.42) 62%, transparent 72%);
  box-shadow:
    0 0 14px rgba(215, 166, 87, 0.52),
    0 0 34px rgba(215, 166, 87, 0.18);
  animation: ember-breath 8.4s ease-in-out infinite;
}

.spark-content {
  padding-bottom: 4px;
}

.spark-place {
  margin: 0 0 13px;
  color: #8a806f;
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.24em;
  line-height: 1.8;
}

.spark-name {
  margin: 0 0 14px;
  color: #252017;
  font-size: clamp(26px, 4vw, 36px);
  font-weight: 300;
  line-height: 1.45;
  letter-spacing: 0.03em;
}

.spark-note {
  max-width: 520px;
  margin: 0;
  color: #6b6256;
  font-size: 16px;
  font-weight: 300;
  line-height: 2;
  letter-spacing: 0.06em;
}

.unlit-path {
  position: absolute;
  left: 0;
  bottom: 42px;
  display: flex;
  height: 66px;
  flex-direction: column;
  justify-content: space-between;
}

.unlit-dot {
  width: 17px;
  height: 17px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(219, 188, 134, 0.32), rgba(175, 137, 88, 0.08) 62%, transparent 74%);
  box-shadow: 0 0 22px rgba(215, 166, 87, 0.08);
  opacity: 0.48;
  animation: unlit-breath 9.2s ease-in-out infinite;
}

.unlit-dot:nth-child(2) {
  animation-delay: 1.8s;
  opacity: 0.35;
}

.unlit-dot:nth-child(3) {
  animation-delay: 3.4s;
  opacity: 0.24;
}

.closing-line {
  max-width: 460px;
  margin: 0 auto;
  color: #6b6256;
  font-size: 17px;
  font-weight: 300;
  line-height: 2.2;
  letter-spacing: 0.08em;
  text-align: center;
}

.coworker-mail {
  display: block;
  width: max-content;
  margin: 42px auto 12px;
  color: #777;
  font-size: 14px;
  font-weight: 300;
  letter-spacing: 0.18em;
  text-decoration: none;
  transition: opacity 0.3s ease;
}

.coworker-mail:hover {
  opacity: 0.62;
}

@keyframes ember-breath {
  0%,
  100% {
    opacity: 0.72;
    transform: scale(0.92);
    box-shadow:
      0 0 12px rgba(215, 166, 87, 0.42),
      0 0 26px rgba(215, 166, 87, 0.13);
  }

  50% {
    opacity: 1;
    transform: scale(1.08);
    box-shadow:
      0 0 18px rgba(215, 166, 87, 0.58),
      0 0 44px rgba(215, 166, 87, 0.22);
  }
}

@keyframes unlit-breath {
  0%,
  100% {
    transform: scale(0.94);
  }

  50% {
    transform: scale(1.04);
  }
}

@media (max-width: 640px) {
  .spark-page {
    width: min(90vw, 520px);
    padding: 78px 0 104px;
  }

  .spark-intro {
    margin-bottom: 74px;
  }

  .spark-intro small {
    letter-spacing: 4px;
  }

  .spark-path {
    gap: 54px;
    padding-bottom: 124px;
  }

  .spark-node {
    gap: 24px;
  }

  .spark-place {
    letter-spacing: 0.18em;
  }

  .spark-note {
    font-size: 15px;
  }
}
</style>
</head>

<body>

<nav>
  <a href="/home.html">首页</a>
  <a href="/test.html">超级星期六</a>
  <a href="/tongxing.html">童行</a>
  <a href="/tongdao.html">同道</a>
  <a href="/what.html">同工</a>
  <a href="/contact.html">联系</a>
</nav>

<main class="spark-page">
  <section class="spark-intro" aria-label="全球同工">
    <small>GLOBAL CO-WORKERS</small>
    <h1>全球同工</h1>
    <p>
      从一个城市到另一个城市，<br>
      火种仍在传递。
    </p>
  </section>

  <section class="spark-path" id="sparkPath" aria-label="火种传递路径"></section>

  <p class="closing-line">
    下一位同行者，<br>
    也许正在读这段文字。
  </p>
</main>

<a class="coworker-mail" href="mailto:ydlmedia@gmail.com">写邮件</a>

<footer>
  <a class="campfire-link" href="yhzd.html">
    ✦ 营火之地
</a>
  <p>© 2026 步道 budao.org</p>
</footer>

<script>
const collaborators = [
  {
    place: "美国 · 加州 · 湾区",
    names: "Simon & Juliana",
    note: "这束微光，越过海洋继续燃起。"
  },
  {
    place: "中国 · 北京 · 顺义",
    names: "Tony夫妇 & Vincent",
    note: "最初的火种，在这里被点亮。"
  },
  {
    place: "中国 · 北京 · 朝阳",
    names: "TT（Titus）",
    note: "新的街区，也有人安静回应同行。"
  },
  {
    place: "中国 · 北京 · 昌平",
    names: "Leo & Laurel",
    note: "城市边缘，也有脚步继续向前。"
  },
  {
    place: "中国 · 北京 · 顺义",
    names: "Toda",
    note: "同一束微光，在熟悉的地方再次被接住。"
  }
];

const sparkPath = document.getElementById("sparkPath");

sparkPath.innerHTML = collaborators.map((collaborator) => `
  <article class="spark-node">
    <span class="spark-light" aria-hidden="true"></span>
    <div class="spark-content">
      <p class="spark-place">${collaborator.place}</p>
      <h2 class="spark-name">${collaborator.names}</h2>
      <p class="spark-note">${collaborator.note}</p>
    </div>
  </article>
`).join("") + `
  <div class="unlit-path" aria-hidden="true">
    <span class="unlit-dot"></span>
    <span class="unlit-dot"></span>
    <span class="unlit-dot"></span>
  </div>
`;
</script>

</body>
</html>

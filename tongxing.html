<style>

.container{
    max-width:900px;
    margin:auto;
    padding:60px 20px 120px 20px;
    text-align:center;
}

.container h1{
    font-size:42px;
    font-weight:300;
    margin-bottom:20px;
}

.container p{
    color:#666;
    line-height:1.8;
}

.card{
    border:1px solid #e5e5e5;
    border-radius:16px;

    padding:30px;
    margin-top:50px;

    transition:0.4s;
    background:white;
}

.card:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.card img{
    width:220px;
    border-radius:12px;
    margin-bottom:20px;
}

.card h3{
    margin-bottom:12px;
    font-weight:500;
}

.card p{
    margin-bottom:20px;
    color:#777;
}

.buttons{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:12px;
}

.buttons button{

    padding:10px 18px;

    background:black;
    color:white;

    border:none;
    border-radius:999px;

    cursor:pointer;

    transition:0.3s;
}

.buttons button:hover{
    opacity:0.85;
}

/* 弹窗 */

.modal{
    display:none;

    position:fixed;
    z-index:999;

    left:0;
    top:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.82);
}

.modal-content{

    position:relative;

    margin:4% auto;

    width:90%;
    max-width:1100px;

    height:85%;

    background:white;
    border-radius:12px;

    overflow:hidden;
}

.modal iframe{
    width:100%;
    height:100%;
    border:none;
}

.close{

    position:absolute;

    right:18px;
    top:10px;

    font-size:30px;
    color:#333;

    cursor:pointer;
    z-index:2;
}

/* 底部营火入口 */

.campfire-link{
    display:block;

    text-align:center;

    margin:120px auto 30px auto;

    color:#888;

    text-decoration:none;

    letter-spacing:4px;
    font-size:12px;

    transition:0.4s;
}

.campfire-link:hover{
    color:#111;
    letter-spacing:6px;
}

/* 手机 */

@media(max-width:768px){

    .container h1{
        font-size:34px;
    }

    .card{
        padding:24px;
    }

    .card img{
        width:180px;
    }

}

<script>

/* 打开弹窗 */

function openModal(url){

    document.getElementById("modal").style.display = "block";

    document.getElementById("modalFrame").src = url;
}

/* 关闭弹窗 */

function closeModal(){

    document.getElementById("modal").style.display = "none";

    document.getElementById("modalFrame").src = "";
}

/* 音频 */

function toggleAudio(audioId, button){

    var audio = document.getElementById(audioId);

    if(audio.paused){

        // 暂停其他音频
        document.querySelectorAll("audio").forEach(a => {
            a.pause();
        });

        // 重置所有按钮
        document.querySelectorAll(".audio-btn").forEach(btn => {
            btn.innerText = "▶ 播放音频";
        });

        audio.play();

        button.innerText = "⏸ 暂停音频";

    }else{

        audio.pause();

        button.innerText = "▶ 播放音频";
    }
}

</script>

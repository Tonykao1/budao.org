<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<title>童行 - 步道</title>
<link rel="stylesheet" href="style.css">

<style>
.container {
    max-width: 900px;
    margin: auto;
    padding: 40px 20px;
    text-align: center;
}

.card {
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 40px;
}

.card img {
    width: 200px;
    border-radius: 8px;
}

.buttons button {
    margin: 10px;
    padding: 8px 16px;
    background: black;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* 弹窗 */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
}

.modal-content {
    position: relative;
    margin: 5% auto;
    width: 80%;
    height: 80%;
    background: #fff;
}

.modal iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.close {
    position: absolute;
    right: 15px;
    top: 10px;
    font-size: 28px;
    cursor: pointer;
}
</style>

</head>

<body>

<nav>

<div class="container">
<h1>童行</h1>
<p>与孩子同行，在阅读中遇见光。</p>

<!-- 卡片1 -->

<div class="card">
<img src="images/dkd.jpg">
<h3>第1周 · 《大蝌蚪》</h3>
<p>“...,若不像小孩子，断不能进去。”</p>

<div class="buttons">
<button onclick="openModal('https://online.fliphtml5.com/qkttd/ksju/')">阅读</button>
<button onclick="openModal('https://player.bilibili.com/player.html?isOutside=true&aid=577359839&bvid=BV1jB4y1o7Qr&cid=1302435791&p=1')">视频</button>
<button class="audio-btn" onclick="toggleAudio()">▶ 播放音频</button>
</div>
    <audio id="audioPlayer">
    <source src="audio/dkd.mp3" type="audio/mpeg">
</audio>
</div>
<div class="card">
<img src="images/Hat.jpg">
<h3>第2周 · 《我要把我的帽子找回来》</h3>
<p>“...并且人要奉他的名传悔改、赦罪的道...”</p>

<div class="buttons">
<button onclick="openModal('https://online.fliphtml5.com/rgbxu/zttc/')">阅读</button>
<button onclick="openModal(<iframe src="//player.bilibili.com/player.html?isOutside=true&aid=763276890&bvid=BV1164y1876i&cid=417036765&p=1" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"></iframe>)">视频</button>
<button class="audio-btn" onclick="toggleAudio()">▶ 播放音频</button>
</div>
    <audio id="audioPlayer">
    <source src="audio/dkd.mp3" type="audio/mpeg">
</audio>
</div>
</div>

<!-- 弹窗 -->

<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">&times;</span>
<iframe id="modalFrame"></iframe>
</div>
</div>

<script>
function openModal(url) {
    document.getElementById("modal").style.display = "block";
    document.getElementById("modalFrame").src = url;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
    document.getElementById("modalFrame").src = "";
}
</script>
<script>
function openModal(url) {
    document.getElementById("modal").style.display = "block";
    document.getElementById("modalFrame").src = url;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
    document.getElementById("modalFrame").src = "";
}
</script>
    <script>
function toggleAudio() {
    var audio = document.getElementById("audioPlayer");
var btn = document.querySelector(".audio-btn");
    if (audio.paused) {
        audio.play();
        btn.innerText = "⏸ 暂停音频";
    } else {
        audio.pause();
        btn.innerText = "▶ 播放音频";
    }
}
</script>
</body>

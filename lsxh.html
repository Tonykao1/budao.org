<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>路上星火 - 步道</title>
<link rel="stylesheet" href="style.css">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#f5f2eb;
    color:#1a1a1a;
    font-family:"PingFang SC","Helvetica Neue",sans-serif;

    background-image:
    radial-gradient(rgba(0,0,0,0.025) 1px, transparent 1px);
    background-size:24px 24px;
}

.container{
    width:90%;
    max-width:1180px;
    margin:auto;
    padding:120px 20px 160px 20px;
}

.hero{
    text-align:center;
    margin-bottom:120px;
}

.hero small{
    letter-spacing:8px;
    color:#9b9387;
    font-size:11px;
}

.hero h1{
    font-size:72px;
    font-weight:200;
    letter-spacing:0.08em;
    margin-top:28px;
    margin-bottom:42px;

    color:#171717;
}

.hero p{
    max-width:760px;
    margin:auto;

    line-height:2.3;
    color:#5f5b55;
    font-size:18px;

    font-weight:300;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:42px;
}

.card{
    position:relative;

    background:rgba(255,255,255,0.72);

    border:1px solid rgba(255,255,255,0.7);

    border-radius:30px;

    overflow:hidden;

    backdrop-filter:blur(10px);

    transition:0.5s;

    box-shadow:
    0 10px 40px rgba(0,0,0,0.04);
}

.card:hover{
    transform:translateY(-8px);

    box-shadow:
    0 25px 80px rgba(0,0,0,0.08);
}

.card::after{
    content:"";

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:linear-gradient(
    to bottom,
    transparent,
    rgba(255,255,255,0.05)
    );

    pointer-events:none;
}

.card img{
    width:100%;
    height:280px;

    object-fit:cover;
    display:block;

    filter:saturate(0.95);
}

.card-content{
    padding:34px;
}

.card-location{
    font-size:11px;
    letter-spacing:5px;
    color:#a39b90;
    margin-bottom:18px;
}

.card h2{
    margin:0 0 22px 0;

    font-weight:300;
    font-size:34px;

    color:#171717;
}

.card p{
    line-height:2.15;
    color:#5f5b55;

    margin-bottom:34px;

    font-size:16px;
    font-weight:300;
}

.card a{
    text-decoration:none;

    color:#171717;

    letter-spacing:2px;
    font-size:12px;

    transition:0.35s;
}

.card a:hover{
    letter-spacing:5px;
}

.footer-note{
    text-align:center;

    margin-top:160px;

    color:#8e867b;

    line-height:2.4;
    font-size:14px;

    font-weight:300;
}

.campfire-link{
    display:block;

    text-align:center;

    margin:140px auto 0 auto;

    color:#8e867b;

    text-decoration:none;

    letter-spacing:5px;
    font-size:12px;

    transition:0.45s;
}

.campfire-link:hover{
    color:#171717;
    letter-spacing:7px;
}

@media(max-width:768px){

    .container{
        padding-top:90px;
    }

    .hero{
        margin-bottom:90px;
    }

    .hero h1{
        font-size:46px;
    }

    .hero p{
        font-size:16px;
        line-height:2.1;
    }

    .card h2{
        font-size:28px;
    }

    .card img{
        height:240px;
    }

}

</style>
</head>

<body>

<nav>
<a href="/home.html">首页</a>
<a href="/about.html">超级星期六</a>
<a href="/tongxing.html">童行</a>
<a href="/what.html">全球同工</a>
<a href="/contact.html">联系</a>
</nav>

<div class="container">

    <div class="hero">

        <small>SPARKS ON THE ROAD</small>

        <h1>路上星火</h1>

        <p>
            在世界不同角落，
            仍有人默默用爱同行。<br>
            他们正在陪伴孩子、照顾老人、
            为陌生人预备热饭，
            也在黑夜里继续点灯。
        </p>

    </div>

    <div class="grid">

        <!-- 卡片 1 -->

        <div class="card">

            <img src="images/angel-home.jpg" alt="天使之家">

            <div class="card-content">

                <div class="card-location">
                    CHANGCHUN
                </div>

                <h2>天使之家</h2>

                <p>
                    有人持续陪伴自闭症儿童，
                    也开始为更多家庭预备热饭。
                    一间小食堂，
                    正在让一些疲惫的人重新感受到被接纳。
                </p>

                <a href="mailto:hello@budao.org">
                    与他们同行 →
                </a>

            </div>

        </div>

        <!-- 卡片 2 -->

        <div class="card">

            <img src="images/dalian-elder.jpg" alt="大连养老院">

            <div class="card-content">

                <div class="card-location">
                    DALIAN
                </div>

                <h2>山海之间</h2>

                <p>
                    有人正在尝试，
                    让农村老人不孤单地老去。
                    他们陪伴、探访、做饭、聊天，
                    也一起慢慢走过黄昏。
                </p>

                <a href="mailto:hello@budao.org">
                    想了解更多 →
                </a>

            </div>

        </div>

    </div>

    <div class="footer-note">
        世界仍有微光。<br>
        而有人，仍在路上。
    </div>

    <a class="campfire-link" href="yhzd.html">
        ✦ 营火之地
    </a>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>同道 - 步道</title>

<link rel="stylesheet" href="style.css">

<style>
* {
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  overflow-x: hidden;
  background: #f5f2eb;
  color: #222;
}

.tongdao-shell {
  min-height: calc(100svh - 55px);
  display: flex;
  justify-content: center;
  padding: 18px 14px;
}

.tongdao-screen {
  width: min(100%, 640px);
  min-height: calc(100svh - 92px);
  margin: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 26px;
  padding: clamp(24px, 7vw, 48px);
  border-radius: 28px;
  background: rgba(255, 255, 255, 0.48);
  text-align: left;
}

.stage {
  color: #9d968b;
  font-size: 11px;
  letter-spacing: 5px;
}

.title {
  margin: 0;
  color: #222;
  font-size: clamp(38px, 11vw, 58px);
  font-weight: 200;
  line-height: 1.3;
  letter-spacing: 0.08em;
}

.title-word {
  display: inline-flex;
  align-items: baseline;
  gap: 0.2em;
}

.title-tong {
  color: #4b463f;
  font-weight: 200;
}

.title-dao {
  color: #111;
  font-weight: 360;
}

.home-kicker {
  color: #555;
  font-size: clamp(18px, 5vw, 24px);
  letter-spacing: 0.22em;
  text-align: center;
}

.body {
  color: #555;
  font-size: 17px;
  font-weight: 300;
  line-height: 2;
  letter-spacing: 0.04em;
}

.body p {
  margin: 0 0 18px;
  color: inherit;
  font: inherit;
  line-height: inherit;
}

.init-call {
  display: inline-block;
  padding: 9px 0;
  color: #3a332a;
  animation: covenantBreath 8s ease-in-out infinite;
}

.quiet-box {
  padding: 20px 0;
  border-top: 1px solid rgba(40, 34, 24, 0.12);
  border-bottom: 1px solid rgba(40, 34, 24, 0.12);
}

.field-stack {
  display: grid;
  gap: 17px;
}

.field-line {
  display: grid;
  gap: 8px;
  color: #777;
  font-size: 13px;
  letter-spacing: 0.08em;
}

.field-line input,
.field-line select {
  width: 100%;
  min-height: 44px;
  border: 0;
  border-bottom: 1px solid rgba(30, 25, 18, 0.22);
  border-radius: 0;
  outline: 0;
  background: transparent;
  color: #222;
  font: inherit;
  font-size: 17px;
}

.field-line input:focus,
.field-line select:focus {
  border-bottom-color: #222;
}

.participant-list {
  display: grid;
  gap: 12px;
}

.participant-row {
  display: grid;
  grid-template-columns: 1fr 112px;
  gap: 12px;
}

.check-line {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  color: #555;
  font-size: 14px;
  line-height: 1.8;
}

.check-line input {
  width: 18px;
  height: 18px;
  margin-top: 4px;
  accent-color: #111;
}

.safety-covenant {
  position: relative;
  padding: 16px 18px 16px 22px;
  border: 1px solid rgba(88, 72, 48, 0.18);
  background: rgba(255, 252, 244, 0.68);
  color: #2f291f;
  font-weight: 420;
}

.safety-covenant::before {
  content: "";
  position: absolute;
  left: 0;
  top: 16px;
  bottom: 16px;
  width: 2px;
  background: rgba(127, 93, 42, 0.38);
}

.group-mode {
  display: grid;
  gap: 12px;
  padding: 2px 0 4px;
}

.group-mode-title {
  color: #777;
  font-size: 13px;
  letter-spacing: 0.08em;
}

.group-mode-options {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}

.group-mode-options label {
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 38px;
  padding: 0 14px;
  border: 1px solid rgba(40, 34, 24, 0.12);
  border-radius: 999px;
  color: #4d463d;
  background: rgba(255, 255, 255, 0.42);
  font-size: 14px;
  letter-spacing: 0.08em;
}

.group-mode-options input {
  accent-color: #111;
}

.welcome-poem {
  text-align: center;
  line-height: 2.25;
  letter-spacing: 0.08em;
}

.icebreaker-list {
  display: grid;
  gap: 12px;
  margin: 0;
  padding-left: 24px;
}

.warmup-list {
  display: flex;
  flex-wrap: wrap;
  gap: 9px;
  margin-top: 12px;
}

.warmup-list span {
  padding: 6px 12px;
  border: 1px solid rgba(40, 34, 24, 0.12);
  border-radius: 999px;
  color: #4d463d;
  background: rgba(255, 255, 255, 0.36);
  font-size: 14px;
}

.warmup-status {
  display: grid;
  gap: 15px;
  padding: 20px 0;
  text-align: center;
}

.warmup-current {
  color: #2b261e;
  font-size: clamp(24px, 7vw, 36px);
  font-weight: 300;
  letter-spacing: 0.1em;
}

.warmup-round {
  color: #8f8679;
  font-size: 13px;
  letter-spacing: 0.18em;
}

.beat-row {
  display: flex;
  justify-content: center;
  gap: 8px;
  font-variant-numeric: tabular-nums;
}

.beat {
  display: grid;
  place-items: center;
  width: 34px;
  aspect-ratio: 1;
  border-radius: 50%;
  color: #968b7d;
  background: rgba(255, 255, 255, 0.38);
  transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
}

.beat.is-active {
  color: #fff;
  background: #191713;
  transform: translateY(-1px);
}

.prayer-figure {
  display: grid;
  place-items: center;
  margin: 0 auto 18px;
}

.prayer-figure svg {
  width: min(56vw, 220px);
  height: auto;
  stroke: #222;
  stroke-width: 2.4;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
}

.note-small {
  color: #8f8679;
  font-size: 13px;
  line-height: 1.9;
  letter-spacing: 0.06em;
}

.message {
  min-height: 24px;
  color: #8a5f30;
  font-size: 14px;
  line-height: 1.8;
}

.timer {
  display: grid;
  place-items: center;
  width: min(64vw, 210px);
  aspect-ratio: 1;
  margin: 4px auto;
  border: 1px solid rgba(40, 34, 24, 0.12);
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.46);
  color: #222;
  font-size: clamp(42px, 14vw, 64px);
  font-weight: 200;
  font-variant-numeric: tabular-nums;
}

.groups {
  display: grid;
  gap: 12px;
}

.group {
  padding: 15px 0;
  border-bottom: 1px solid rgba(40, 34, 24, 0.12);
  color: #333;
  font-size: 18px;
  line-height: 1.8;
}

.group small {
  display: block;
  margin-bottom: 3px;
  color: #9d968b;
  font-size: 11px;
  letter-spacing: 0.24em;
}

.theme,
.question,
.scripture,
.challenge {
  color: #2b261e;
  font-size: clamp(22px, 6vw, 32px);
  font-weight: 300;
  line-height: 1.75;
  letter-spacing: 0.04em;
}

.actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  margin-top: auto;
  padding-top: 14px;
}

.actions > div {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

button {
  font: inherit;
}

.primary,
.secondary,
.plain {
  min-height: 48px;
  border: 0;
  border-radius: 999px;
  cursor: pointer;
  letter-spacing: 0.14em;
  transition: opacity 0.24s ease, transform 0.24s ease;
}

.primary {
  padding: 0 24px;
  background: #111;
  color: white;
}

.secondary {
  padding: 0 20px;
  background: rgba(255, 255, 255, 0.72);
  color: #333;
}

.plain {
  min-height: auto;
  padding: 8px 0;
  background: transparent;
  color: #777;
}

.primary:hover,
.secondary:hover,
.plain:hover {
  opacity: 0.76;
  transform: translateY(-1px);
}

.primary:disabled {
  opacity: 0.34;
  cursor: not-allowed;
  transform: none;
}

@keyframes covenantBreath {
  0%, 100% {
    opacity: 0.72;
  }
  50% {
    opacity: 1;
  }
}

@media (max-width: 640px) {
  nav {
    justify-content: flex-start;
    overflow-x: auto;
  }

  .tongdao-shell {
    padding: 12px;
  }

  .tongdao-screen {
    min-height: calc(100svh - 78px);
    border-radius: 22px;
  }

  .participant-row {
    grid-template-columns: 1fr;
    gap: 5px;
  }

  .actions,
  .actions > div {
    width: 100%;
  }

  .primary,
  .secondary {
    flex: 1 1 100%;
  }
}
</style>
</head>

</nav>

  <section class="tongdao-screen" id="screen" aria-live="polite"></section>

</body>
</html>

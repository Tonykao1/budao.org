<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>超级星期六 - 步道</title>

<link rel="stylesheet" href="style.css">

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<style>

body{
    background:#f5f2eb;
}

/* 页面主体 */

.super-container{

    width:92%;
    max-width:1280px;

    margin:auto;

    padding:80px 20px 160px 20px;
}

/* 顶部 */

.super-hero{

    text-align:center;

    margin-bottom:100px;
}

.super-hero small{

    font-size:11px;

    letter-spacing:6px;

    color:#9d968b;
}

.super-hero h1{

    font-size:58px;

    font-weight:200;

    margin-top:24px;
    margin-bottom:28px;

    letter-spacing:0.08em;
}

.super-hero p{

    color:#666;

    font-size:17px;

    line-height:2;
}

/* 双路线 */

.route-grid{

    display:grid;

    grid-template-columns:
    repeat(3,minmax(0,1fr));

    gap:42px;
}

/* 卡片 */

.route-card{

    background:white;

    border-radius:30px;

    overflow:hidden;

    transition:0.4s;

    box-shadow:
    0 12px 40px rgba(0,0,0,0.05);
}

.route-card:hover{

    transform:translateY(-5px);

    box-shadow:
    0 24px 70px rgba(0,0,0,0.08);
}

/* 图片 */

.route-image{

    position:relative;
    aspect-ratio:16/9;
    overflow:hidden;
}

.route-image img{

    width:100%;

    height:100%;

    object-fit:cover;

    display:block;
}

.route-image-placeholder{

    display:block;

    width:100%;
    height:100%;

    background:
    radial-gradient(circle at 50% 42%,rgba(214,198,164,0.2),transparent 32%),
    linear-gradient(145deg,#eee9df,#d8d0c2);
}

/* 倒计时 */



/* 内容 */

.route-content{

    padding:34px;
}

.route-location{

    font-size:11px;

    letter-spacing:4px;

    color:#a49b90;

    margin-bottom:18px;
}

.route-content h2{

    margin:0 0 20px 0;

    font-size:32px;

    font-weight:300;
}

.route-description{

    line-height:2;

    color:#5f5b55;

    margin-bottom:28px;

    font-size:15px;
}

/* 参数 */

.route-info{

    display:flex;

    flex-wrap:wrap;

    gap:12px;

    margin-bottom:32px;
}

.route-info span{

    background:#f4f1eb;

    padding:10px 14px;

    border-radius:999px;

    font-size:13px;

    color:#666;
}

/* 时区 */

.route-timezone{

    margin-bottom:26px;

    font-size:13px;

    color:#999;

    letter-spacing:1px;
}

/* 按钮 */

.route-button{

    display:inline-block;

    padding:12px 22px;

    background:#111;

    color:white;

    text-decoration:none;

    border-radius:999px;

    font-size:13px;

    letter-spacing:2px;

    transition:0.3s;
}

.route-button:hover{

    opacity:0.75;
}

/* 页脚 */

.super-footer{

    text-align:center;

    margin-top:150px;

    color:#8d8579;

    line-height:2.3;

    font-size:14px;
}

/* 放大图 */

.image-modal{

    display:none;

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:
    rgba(0,0,0,0.82);

    justify-content:center;
    align-items:center;

    z-index:999;
}

.image-modal-content{

    max-width:90%;
    max-height:90%;

    border-radius:18px;
}

/* 手机 */

@media(max-width:1100px){

    .route-grid{
        grid-template-columns:repeat(2,minmax(0,1fr));
    }

}

@media(max-width:760px){

    .super-container{
        padding-top:60px;
    }

    .super-hero h1{
        font-size:42px;
    }

    .route-grid{
        grid-template-columns:1fr;
    }

    .route-content{
        padding:28px;
    }

    .route-content h2{
        font-size:26px;
    }

}

</style>
</head>

<body>

<nav>
<a href="/home.html">首页</a>
<a href="/about.html">超级星期六</a>
<a href="/tongxing.html">童行</a>
<a href="/what.html">全球同工</a>
<a href="/contact.html">联系</a>
</nav>

<div class="super-container">

    <!-- 顶部 -->

    <div class="super-hero">

        <small>SUPER SATURDAY</small>

        <h1>本周同行</h1>

        <p>
            有人仍在城市边缘继续向前走。<br>
            也有人，在不同国家与时区里，彼此同行。
        </p>

    </div>

    <!-- 双路线 -->

   <div
class="route-grid"
id="routeGrid"></div>

    <!-- 页脚 -->

    <div class="super-footer">

        世界仍有微光。<br>
        而有人，仍在路上。

    </div>

</div>

<!-- 图片放大 -->

<div
class="image-modal"
id="imageModal"
onclick="closeImage()">

<img
id="modalImage"
class="image-modal-content">

</div>

<script>

/* 放大图 */

function openImage(src){

    document
    .getElementById("imageModal")
    .style.display = "flex";

    document
    .getElementById("modalImage")
    .src = src;
}

function closeImage(){

    document
    .getElementById("imageModal")
    .style.display = "none";
}

function replaceBrokenImage(image){

    const placeholder =
    document.createElement("span");

    placeholder.className =
    "route-image-placeholder";

    image.replaceWith(placeholder);
}

let events = [];

const defaultRoutes = [
{
    location:"北京 · 怀柔",
    title:"沙峪口书画山环线",
    description:"有人正在城市边缘，\n留下一段慢慢同行的路。\n山野之间，\n也许会重新听见自己。",
    time:"08:30",
    duration:"3小时",
    distance:"5.5千米",
    surface:"土石野路 / 石阶",
    elevation:"↑334米",
    timezone:"Asia/Shanghai",
    date:"2026-06-27",
    image:""
},
{
    location:"Oakland · California",
    title:"Reinhardt Redwood Regional Park",
    description:"有人正在另一片大陆，\n继续学习彼此陪伴。\n清晨与黄昏之间，\n也仍有人在同行。",
    time:"10:00",
    duration:"3小时",
    distance:"1.8-3miles",
    surface:"土路 / 林间路",
    elevation:"↑180-700feet",
    timezone:"America/Los_Angeles",
    date:"2026-07-04",
    image:""
}
];

/* 路线配置 */

fetch("/api/routes")
    .then(response=>response.json())
    .then(routes=>{
        const activeRoutes =
        Array.isArray(routes) && routes.length ?
        routes :
        defaultRoutes;

        renderRoutes(activeRoutes);

        events =
        activeRoutes.map((route,index)=>({
            id:"countdown"+(index+1),
            date:route.date,
            time:route.time,
            duration:parseDuration(route.duration),
            timezone:route.timezone
        }));

        updateAll();

        setInterval(updateAll,1000);
    })
    .catch(()=>{
        renderRoutes(defaultRoutes);

        events =
        defaultRoutes.map((route,index)=>({
            id:"countdown"+(index+1),
            date:route.date,
            time:route.time,
            duration:parseDuration(route.duration),
            timezone:route.timezone
        }));

        updateAll();

        setInterval(updateAll,1000);
    });

/* 路线渲染 */

function renderRoutes(routes){

    const grid =
    document.getElementById("routeGrid");

    grid.innerHTML = "";

    routes.forEach((route,index)=>{

        const card =
        document.createElement("div");

        card.className = "route-card";

        const imageHtml =
        `
            <div class="route-image">
                ${
                    route.image ?
                    `<img src="${escapeAttribute(route.image)}" alt="${escapeAttribute(route.imageAlt || route.title)}" onclick="openImage(this.src)" onerror="replaceBrokenImage(this)">` :
                    `<span class="route-image-placeholder"></span>`
                }
            </div>
        `;

        card.innerHTML =
        `
            <div class="route-timer">

    <div class="timer-city">

        ${escapeHtml(getTimerCity(route))}

    </div>

    <div class="route-countdown"
    id="countdown${index+1}">

        倒计时加载中...

    </div>

</div>

            ${imageHtml}

            <div class="route-content">

                <div class="route-location">

                    ${escapeHtml(route.location)}

                </div>

                <h2>

                    ${escapeHtml(route.title)}

                </h2>

                <div class="route-description">

                    ${escapeHtml(route.description).replace(/\n/g,"<br>")}

                </div>

               <div class="route-info">

    <span>${escapeHtml(route.time)} 集合</span>

    <span>${escapeHtml(route.duration)}</span>

    <span>${escapeHtml(route.distance)}</span>

    <span>${escapeHtml(route.surface)}</span>

    <span>${escapeHtml(route.elevation)}</span>

</div>

                <div class="route-timezone">

                    ${escapeHtml(route.timezone)} · ${escapeHtml(getUtcLabel(route.timezone,route.date,route.time))}

                </div>

                <a
                href="#"
                class="route-button">

                    与他们同行 →

                </a>

            </div>
        `;

        grid.appendChild(card);
    });
}

function escapeHtml(value){

    return String(value || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function escapeAttribute(value){

    return escapeHtml(value)
    .replace(/`/g,"&#096;");
}

function parseDuration(duration){

    const text =
    String(duration || "");

    const hourMatch =
    text.match(/([\d.]+)\s*(小时|hour|hours|h)/i);

    if(hourMatch){

        return Math.round(Number(hourMatch[1]) * 60);
    }

    const minuteMatch =
    text.match(/([\d.]+)\s*(分钟|minute|minutes|min|m)/i);

    if(minuteMatch){

        return Math.round(Number(minuteMatch[1]));
    }

    return 180;
}

function getTimerCity(route){

    return route.location || getUtcLabel(route.timezone,route.date,route.time);
}

function getUtcLabel(timezone,date,time){

    if(!timezone || !date){

        return "UTC+8";
    }

    const target =
    new Date(`${normalizeDate(date)}T${time || "00:00"}:00`);

    const utcDate =
    new Date(
        target.toLocaleString(
            "en-US",
            {timeZone:"UTC"}
        )
    );

    const localDate =
    new Date(
        target.toLocaleString(
            "en-US",
            {timeZone:timezone}
        )
    );

    const offsetHours =
    Math.round((localDate - utcDate) / (1000 * 60 * 60));

    return "UTC" + (offsetHours >= 0 ? "+" : "") + offsetHours;
}

/* 获取时间状态 */

function getEventState(event){

    const now = new Date();

    const localNow =
    new Date(
        now.toLocaleString(
            "en-US",
            {timeZone:event.timezone}
        )
    );

    const start =
    new Date(
        `${normalizeDate(event.date)}T${event.time}:00`
    );

    const end =
    new Date(
        start.getTime() +
        event.duration * 60 * 1000
    );

    if(localNow < start){

        return{
            state:"countdown",
            diff:start - localNow
        };

    }else if(
        localNow >= start &&
        localNow < end
    ){

        return{
            state:"started",
            diff:end - localNow
        };

    }else{

        return{
            state:"ended",
            diff:0
        };
    }
}

function normalizeDate(date){

    const value =
    String(date || "");

    const match =
    value.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);

    if(match){

        return [
            match[1],
            match[2].padStart(2,"0"),
            match[3].padStart(2,"0")
        ].join("-");
    }

    return value;
}

/* 渲染 */

function renderCountdown(id,diff){

    const el =
    document.getElementById(id);

    if(!el){

        return;
    }

    const hours =
    Math.floor(diff/(1000*60*60));

    const minutes =
    Math.floor(
        (diff%(1000*60*60))
        /(1000*60)
    );

    const seconds =
    Math.floor(
        (diff%(1000*60))
        /1000
    );

    el.innerHTML =
    hours+"小时 "+
    minutes+"分 "+
    seconds+"秒";
}

function renderStarted(id){

    const el =
    document
    .getElementById(id);

    if(!el){

        return;
    }

    el.innerHTML =
    "正在同行";
}

function renderEnded(id){

    const el =
    document
    .getElementById(id);

    if(!el){

        return;
    }

    el.innerHTML =
    "已完成此程";
}

/* 更新 */

function updateAll(){

    events.forEach(event=>{

        const result =
        getEventState(event);

        if(result.state==="countdown"){

            renderCountdown(
                event.id,
                result.diff
            );
        }

        if(result.state==="started"){

            renderStarted(event.id);
        }

        if(result.state==="ended"){

            renderEnded(event.id);
        }

    });
}
</script>

</body>
</html>

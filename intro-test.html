<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Plus Universe</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #000;
  overflow: hidden;
}

/* 中心文字 */
#introText {
  position: absolute;
  top: 50%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 30px;
  letter-spacing: 8px;
  opacity: 0;
  transform: translateY(-50%);
  transition: opacity 6s ease;
  font-weight: 300;
}

/* ⭐ 中心光层（关键） */
#lightBurst {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;

  /* 初始几乎不可见 */
  background: radial-gradient(circle at center,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,0) 10%,
    rgba(255,255,255,0.02) 20%,
    rgba(255,255,255,0.05) 40%,
    rgba(255,255,255,0.1) 70%,
    rgba(255,255,255,0.2) 100%
  );

  opacity: 0;
  transition: opacity 4s ease;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<div id="introText">创 始 成 终</div>
<div id="lightBurst"></div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let phase = 0;
let centerX, centerY;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  centerX = canvas.width / 2;
  centerY = canvas.height / 2;
}
resize();
window.addEventListener("resize", resize);

// 鼠标
let mouseX = centerX;
let mouseY = centerY;

window.addEventListener("mousemove", e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// ⭐ 星星
const stars = [];
const COUNT = 720;
const UNIVERSE_RADIUS = () => Math.max(canvas.width, canvas.height) * 3.5;

function createStar() {
  let angle = Math.random() * Math.PI * 2;
  let radius = Math.random() * UNIVERSE_RADIUS();

  return {
    x: centerX + Math.cos(angle) * radius,
    y: centerY + Math.sin(angle) * radius,
    vx: 0,
    vy: 0,
    size: Math.random() * 12 + 10,
    alpha: Math.random() * 0.7 + 0.2
  };
}

for (let i = 0; i < COUNT; i++) {
  stars.push(createStar());
}

// 动画
function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.12)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  for (let s of stars) {

    if (phase === 1) {
      let dx = centerX - s.x;
      let dy = centerY - s.y;

      let dist = Math.sqrt(dx*dx + dy*dy) + 0.1;
      let force = 0.03 / dist;

      s.vx += dx * force;
      s.vy += dy * force;
    }

    // 鼠标扰动
    let dx = mouseX - s.x;
    let dy = mouseY - s.y;
    let distMouse = Math.sqrt(dx*dx + dy*dy);

    if (distMouse < 120) {
      s.vx += dx * 0.00003;
      s.vy += dy * 0.00003;
    }

    // 随机扰动
    s.vx += (Math.random() - 0.5) * 0.003;
    s.vy += (Math.random() - 0.5) * 0.003;

    s.vx *= 0.997;
    s.vy *= 0.997;

    s.x += s.vx;
    s.y += s.vy;

    ctx.fillStyle = "rgba(255,255,255," + s.alpha + ")";
    ctx.font = s.size + "px monospace";
    ctx.fillText("+", s.x, s.y);
  }

  requestAnimationFrame(animate);
}

animate();

/* ===== 节奏 ===== */

// 收束开始
setTimeout(() => {
  phase = 1;
}, 5000);

// 文字显现（接近顶点）
setTimeout(() => {
  document.getElementById("introText").style.opacity = 1;
}, 15000);

// ⭐ 中心光爆发
setTimeout(() => {
  document.getElementById("lightBurst").style.opacity = 1;
}, 18500);

// ⭐ 再加强一次（更接近完全白）
setTimeout(() => {
  document.getElementById("lightBurst").style.background =
    "radial-gradient(circle at center, white 0%, white 100%)";
}, 21000);

// 跳转
setTimeout(() => {
  window.location.href = "/index.html";
}, 24000);

</script>

</body>
</html>

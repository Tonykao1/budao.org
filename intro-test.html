<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Plus Universe</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #000;
  overflow: hidden;
}

#introText {
  position: absolute;
  top: 50%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 32px;
  letter-spacing: 10px;
  opacity: 0;
  transform: translateY(-50%);
  transition: 4s;
  font-weight: 300;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<div id="introText">创 始 成 终</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let centerX, centerY;
let phase = 0;

// 屏幕适配
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  centerX = canvas.width / 2;
  centerY = canvas.height / 2;
}
resize();
window.addEventListener("resize", resize);

// 星体
const stars = [];
const COUNT = 400;

// 从“宇宙外”生成
function spawnStar() {
  const angle = Math.random() * Math.PI * 2;
  const radius = Math.max(canvas.width, canvas.height) * (0.6 + Math.random());

  return {
    x: centerX + Math.cos(angle) * radius,
    y: centerY + Math.sin(angle) * radius,
    vx: 0,
    vy: 0,
    size: Math.random() * 10 + 8,
    alpha: Math.random() * 0.6 + 0.2
  };
}

for (let i = 0; i < COUNT; i++) {
  stars.push(spawnStar());
}

// 动画
function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.15)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 中心光
  let gradient = ctx.createRadialGradient(
    centerX, centerY, 0,
    centerX, centerY, 250
  );
  gradient.addColorStop(0, "rgba(255,255,255,0.06)");
  gradient.addColorStop(1, "rgba(0,0,0,0)");

  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  for (let s of stars) {

    if (phase === 1) {
      let dx = centerX - s.x;
      let dy = centerY - s.y;

      s.vx += dx * 0.0004;
      s.vy += dy * 0.0004;
    }

    // 极弱随机
    s.vx += (Math.random() - 0.5) * 0.01;
    s.vy += (Math.random() - 0.5) * 0.01;

    // 阻尼
    s.vx *= 0.99;
    s.vy *= 0.99;

    s.x += s.vx;
    s.y += s.vy;

    // ❗关键：不再wrap，改为“消失再生成”
    let dist = Math.hypot(s.x - centerX, s.y - centerY);

    // 到中心 → 消失重生
    if (dist < 20 && phase === 1) {
      Object.assign(s, spawnStar());
      continue;
    }

    // 太远 → 重生（避免边界感）
    if (dist > Math.max(canvas.width, canvas.height) * 1.5) {
      Object.assign(s, spawnStar());
      continue;
    }

    // 绘制
    ctx.fillStyle = "rgba(255,255,255," + s.alpha + ")";
    ctx.font = s.size + "px monospace";
    ctx.fillText("+", s.x, s.y);
  }

  requestAnimationFrame(animate);
}

animate();

/* 节奏 */

// 6秒后开始归向中心
setTimeout(() => {
  phase = 1;
}, 6000);

// 7秒文字显现
setTimeout(() => {
  document.getElementById("introText").style.opacity = 1;
}, 7000);

// 14秒淡出
setTimeout(() => {
  document.body.style.transition = "opacity 3s";
  document.body.style.opacity = 0;
}, 14000);

// 17秒跳转
setTimeout(() => {
  window.location.href = "/index.html";
}, 17000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Plus Universe</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #000;
  overflow: hidden;
}

/* 中心文字 */
#introText {
  position: absolute;
  top: 50%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 30px;
  letter-spacing: 8px;
  opacity: 0;
  transform: translateY(-50%);
  transition: 4s;
  font-weight: 300;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<div id="introText">一步一步</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let phase = 0;
let centerX, centerY;

// 屏幕适配
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  centerX = canvas.width / 2;
  centerY = canvas.height / 2;
}
resize();
window.addEventListener("resize", resize);

// 鼠标（轻微影响）
let mouseX = centerX;
let mouseY = centerY;

window.addEventListener("mousemove", e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// 星星（+）
const stars = [];
const COUNT = 400;

for (let i = 0; i < COUNT; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    size: Math.random() * 12 + 10,
    alpha: Math.random() * 0.7 + 0.2
  });
}

// 动画
function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.12)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  for (let s of stars) {

    // 阶段1：缓慢归向中心（神圣感关键）
    if (phase === 1) {
      let dx = centerX - s.x;
      let dy = centerY - s.y;

      s.vx += dx * 0.00025;
      s.vy += dy * 0.00025;
    }

    // 鼠标轻微扰动（非常弱）
    let dx = mouseX - s.x;
    let dy = mouseY - s.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < 120) {
      s.vx += dx * 0.00005;
      s.vy += dy * 0.00005;
    }

    // 极弱随机扰动（避免机械感）
    s.vx += (Math.random() - 0.5) * 0.008;
    s.vy += (Math.random() - 0.5) * 0.008;

    // 阻尼（让运动更“沉”）
    s.vx *= 0.995;
    s.vy *= 0.995;

    // 更新位置
    s.x += s.vx;
    s.y += s.vy;

    // 边界循环
    if (s.x < 0) s.x = canvas.width;
    if (s.x > canvas.width) s.x = 0;
    if (s.y < 0) s.y = canvas.height;
    if (s.y > canvas.height) s.y = 0;

    // 绘制 "+"
    ctx.fillStyle = "rgba(255,255,255," + s.alpha + ")";
    ctx.font = s.size + "px monospace";
    ctx.fillText("+", s.x, s.y);
  }

  requestAnimationFrame(animate);
}

animate();

/* ===== 节奏控制（核心） ===== */

// 6秒 → 才开始聚集（先让人“进入宇宙”）
setTimeout(() => {
  phase = 1;
}, 6000);

// 7秒 → 文字慢慢出现
setTimeout(() => {
  document.getElementById("introText").style.opacity = 1;
}, 7000);

// 14秒 → 慢慢淡出
setTimeout(() => {
  document.body.style.transition = "opacity 3s";
  document.body.style.opacity = 0;
}, 14000);

// 17秒 → 进入主页
setTimeout(() => {
  window.location.href = "/index.html"; // ⚠️ 改成你的主页路径
}, 17000);

</script>

</body>
</html>

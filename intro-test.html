<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Plus Universe</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #000;
  overflow: hidden;
}

#introText {
  position: absolute;
  top: 50%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 30px;
  letter-spacing: 8px;
  opacity: 0;
  transform: translateY(-50%);
  transition: 4s;
  font-weight: 300;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<div id="introText">创 始 成 终</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let phase = 0;
let centerX, centerY;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  centerX = canvas.width / 2;
  centerY = canvas.height / 2;
}
resize();
window.addEventListener("resize", resize);

// 鼠标
let mouseX = centerX;
let mouseY = centerY;

window.addEventListener("mousemove", e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// ⭐⭐⭐ 1️⃣ 密度增加 80%
const stars = [];
const COUNT = 720; // 原来400 → 720

// ⭐⭐⭐ 3️⃣ 初始宇宙半径扩大（关键）
const UNIVERSE_RADIUS_MULTIPLIER = 3.5;

function createStar() {
  let maxR = Math.max(canvas.width, canvas.height) * UNIVERSE_RADIUS_MULTIPLIER;

  let angle = Math.random() * Math.PI * 2;
  let radius = Math.random() * maxR;

  return {
    x: centerX + Math.cos(angle) * radius,
    y: centerY + Math.sin(angle) * radius,
    vx: 0,
    vy: 0,
    size: Math.random() * 12 + 10,
    alpha: Math.random() * 0.7 + 0.2
  };
}

// 初始化
for (let i = 0; i < COUNT; i++) {
  stars.push(createStar());
}

// 动画
function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.12)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  for (let s of stars) {

    // ⭐⭐⭐ 2️⃣ 只收束一次（无循环生成）
    if (phase === 1) {
      let dx = centerX - s.x;
      let dy = centerY - s.y;

      let dist = Math.sqrt(dx*dx + dy*dy) + 0.1;

      // ⭐⭐⭐ 3️⃣ 更“远→慢，近→快”的引力
      let force = 0.03 / dist;

      s.vx += dx * force;
      s.vy += dy * force;
    }

    // 鼠标微扰
    let dx = mouseX - s.x;
    let dy = mouseY - s.y;
    let distMouse = Math.sqrt(dx*dx + dy*dy);

    if (distMouse < 120) {
      s.vx += dx * 0.00003;
      s.vy += dy * 0.00003;
    }

    // 极弱扰动
    s.vx += (Math.random() - 0.5) * 0.003;
    s.vy += (Math.random() - 0.5) * 0.003;

    s.vx *= 0.997;
    s.vy *= 0.997;

    s.x += s.vx;
    s.y += s.vy;

    ctx.fillStyle = "rgba(255,255,255," + s.alpha + ")";
    ctx.font = s.size + "px monospace";
    ctx.fillText("+", s.x, s.y);
  }

  requestAnimationFrame(animate);
}

animate();

/* ===== 节奏（重构） ===== */

// ⭐ 提前一点进入“召集感”
setTimeout(() => {
  phase = 1;
}, 5000);

// ⭐ 更早出现文字（但慢慢显）
setTimeout(() => {
  document.getElementById("introText").style.opacity = 1;
}, 7000);

// ⭐ 延长收束时间（核心）
setTimeout(() => {
  document.body.style.transition = "opacity 4s";
  document.body.style.opacity = 0;
}, 20000);

// ⭐ 最终跳转（给足时间达到“顶点”）
setTimeout(() => {
  window.location.href = "/index.html";
}, 23000);

</script>

</body>
</html>

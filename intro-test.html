<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Plus Universe</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #000;
  overflow: hidden;
}

/* 中心文字 */
#introText {
  position: absolute;
  top: 50%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 30px;
  letter-spacing: 8px;
  opacity: 0;
  transform: translateY(-50%);
  transition: 4s;
  font-weight: 300;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<div id="introText">创 始 成 终</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let phase = 0;
let centerX, centerY;

// 屏幕适配
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  centerX = canvas.width / 2;
  centerY = canvas.height / 2;
}
resize();
window.addEventListener("resize", resize);

// 鼠标（轻微影响）
let mouseX = centerX;
let mouseY = centerY;

window.addEventListener("mousemove", e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// 星星（+）
const stars = [];
const COUNT = 400;

for (let i = 0; i < COUNT; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    size: Math.random() * 12 + 10,
    alpha: Math.random() * 0.7 + 0.2
  });
}

// 动画
function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.12)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  for (let s of stars) {

    // 阶段1：缓慢归向中心
    if (phase === 1) {
      let dx = centerX - s.x;
      let dy = centerY - s.y;

      s.vx += dx * 0.00025;
      s.vy += dy * 0.00025;
    }

    // 鼠标轻微扰动
    let dx = mouseX - s.x;
    let dy = mouseY - s.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < 120) {
      s.vx += dx * 0.00005;
      s.vy += dy * 0.00005;
    }

    // 极弱随机扰动
    s.vx += (Math.random() - 0.5) * 0.008;
    s.vy += (Math.random() - 0.5) * 0.008;

    // 阻尼
    s.vx *= 0.995;
    s.vy *= 0.995;

    // 更新位置
    s.x += s.vx;
    s.y += s.vy;

    // ✅ 核心修复：无边界宇宙（替代原来的“方形循环”）
    let dxCenter = s.x - centerX;
    let dyCenter = s.y - centerY;
    let distCenter = Math.sqrt(dxCenter*dxCenter + dyCenter*dyCenter);

    if (distCenter > Math.max(canvas.width, canvas.height)) {

      let angle = Math.random() * Math.PI * 2;
      let radius = Math.max(canvas.width, canvas.height);

      s.x = centerX + Math.cos(angle) * radius;
      s.y = centerY + Math.sin(angle) * radius;

      s.vx = 0;
      s.vy = 0;
    }

    // 绘制 "+"
    ctx.fillStyle = "rgba(255,255,255," + s.alpha + ")";
    ctx.font = s.size + "px monospace";
    ctx.fillText("+", s.x, s.y);
  }

  requestAnimationFrame(animate);
}

animate();

/* ===== 节奏控制 ===== */

setTimeout(() => {
  phase = 1;
}, 6000);

setTimeout(() => {
  document.getElementById("introText").style.opacity = 1;
}, 7000);

setTimeout(() => {
  document.body.style.transition = "opacity 3s";
  document.body.style.opacity = 0;
}, 14000);

setTimeout(() => {
  window.location.href = "/index.html";
}, 17000);

</script>

</body>
</html>

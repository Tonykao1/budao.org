<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Plus Universe</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #000;
  overflow: hidden;
}

/* 中心文字 */
#introText {
  position: absolute;
  top: 50%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 30px;
  letter-spacing: 8px;
  opacity: 0;
  transform: translateY(-50%);
  transition: opacity 6s ease; /* 更慢显现 */
  font-weight: 300;
}

/* 白光层 */
#whiteFade {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0;
  pointer-events: none;
  transition: opacity 5s ease;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<div id="introText">创 始 成 终</div>
<div id="whiteFade"></div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let phase = 0;
let centerX, centerY;

// 屏幕适配
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  centerX = canvas.width / 2;
  centerY = canvas.height / 2;
}
resize();
window.addEventListener("resize", resize);

// 鼠标（轻微影响）
let mouseX = centerX;
let mouseY = centerY;

window.addEventListener("mousemove", e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// ⭐ 星星数量增加 80%
const stars = [];
const COUNT = 720;

// ⭐ 宇宙半径扩大（保证长距离收束）
const UNIVERSE_RADIUS = () => Math.max(canvas.width, canvas.height) * 3.5;

function createStar() {
  let angle = Math.random() * Math.PI * 2;
  let radius = Math.random() * UNIVERSE_RADIUS();

  return {
    x: centerX + Math.cos(angle) * radius,
    y: centerY + Math.sin(angle) * radius,
    vx: 0,
    vy: 0,
    size: Math.random() * 12 + 10,
    alpha: Math.random() * 0.7 + 0.2
  };
}

// 初始化
for (let i = 0; i < COUNT; i++) {
  stars.push(createStar());
}

// 动画
function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.12)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  for (let s of stars) {

    // 收束（一次性）
    if (phase === 1) {
      let dx = centerX - s.x;
      let dy = centerY - s.y;

      let dist = Math.sqrt(dx*dx + dy*dy) + 0.1;

      // 非线性引力（远慢近快）
      let force = 0.03 / dist;

      s.vx += dx * force;
      s.vy += dy * force;
    }

    // 鼠标极弱扰动
    let dx = mouseX - s.x;
    let dy = mouseY - s.y;
    let distMouse = Math.sqrt(dx*dx + dy*dy);

    if (distMouse < 120) {
      s.vx += dx * 0.00003;
      s.vy += dy * 0.00003;
    }

    // 极弱随机扰动
    s.vx += (Math.random() - 0.5) * 0.003;
    s.vy += (Math.random() - 0.5) * 0.003;

    // 阻尼（更沉稳）
    s.vx *= 0.997;
    s.vy *= 0.997;

    // 更新位置
    s.x += s.vx;
    s.y += s.vy;

    // 绘制 "+"
    ctx.fillStyle = "rgba(255,255,255," + s.alpha + ")";
    ctx.font = s.size + "px monospace";
    ctx.fillText("+", s.x, s.y);
  }

  requestAnimationFrame(animate);
}

animate();

/* ===== 节奏控制 ===== */

// 开始收束（稍早进入）
setTimeout(() => {
  phase = 1;
}, 5000);

// ⭐ 文字在接近顶点时才出现
setTimeout(() => {
  document.getElementById("introText").style.opacity = 1;
}, 15000);

// ⭐ 白光吞没（终点）
setTimeout(() => {
  document.getElementById("whiteFade").style.opacity = 1;
}, 19000);

// ⭐ 进入主页
setTimeout(() => {
  window.location.href = "/index.html";
}, 24000);

</script>

</body>
</html>

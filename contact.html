<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>易彼益 - 步道</title>

<link rel="stylesheet" href="style.css">

<style>
* {
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  margin: 0;
  background: #f7f6f2;
  color: #222;
}

.yibiyi-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 96px 28px 64px;
}

.yibiyi-frame {
  position: relative;
  width: min(88vw, 980px);
  overflow: hidden;
  background: #16120e;
  box-shadow:
    0 34px 90px rgba(70, 58, 42, 0.12),
    0 8px 24px rgba(70, 58, 42, 0.06);
}

.yibiyi-image {
  display: block;
  width: 100%;
  height: auto;
}

.yibiyi-mark {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 0 24px 56px;
  background: linear-gradient(
    180deg,
    rgba(16, 12, 8, 0) 42%,
    rgba(16, 12, 8, 0.22) 72%,
    rgba(16, 12, 8, 0.48) 100%
  );
  color: #fffaf0;
  text-align: center;
}

.yibiyi-title {
  margin: 0 0 14px;
  font-size: clamp(38px, 7vw, 72px);
  font-weight: 300;
  letter-spacing: 0.22em;
  line-height: 1.1;
}

.yibiyi-soon {
  margin: 0;
  color: rgba(255, 250, 240, 0.82);
  font-size: clamp(14px, 2.2vw, 19px);
  font-weight: 300;
  letter-spacing: 0.36em;
  line-height: 1.8;
}

@media (max-width: 640px) {
  .yibiyi-page {
    padding: 84px 18px 46px;
  }

  .yibiyi-frame {
    width: min(90vw, 520px);
  }

  .yibiyi-mark {
    padding-bottom: 34px;
  }
}
</style>
</head>

<body>

<nav>
  <a href="/home.html">首页</a>
  <a href="/test.html">超级星期六</a>
  <a href="/tongxing.html">童行</a>
  <a href="/tongdao.html">同道</a>
  <a href="/what.html">同工</a>
  <a href="/contact.html">联系</a>
</nav>

<main class="yibiyi-page" aria-label="易彼益 即将推出">
  <figure class="yibiyi-frame">
    <img class="yibiyi-image" src="/yibiyi-coming-soon.jpg" alt="易彼益，即将推出">
    <figcaption class="yibiyi-mark">
      <h1 class="yibiyi-title">易彼益</h1>
      <p class="yibiyi-soon">即将推出</p>
    </figcaption>
  </figure>
</main>

</body>
</html>
